name: 'publish package'

on:
  workflow_dispatch:
  schedule:
    # Every Monday at 10:00 UTC
    - cron: '0 10 * * 1'

jobs:
  build:

    name: 'build and publish'
    runs-on: macos-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: checkout project
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for changes since last release tag
        id: changes
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "No previous tag found — first release"
          elif [ "$(git rev-list "$LAST_TAG"..HEAD --count)" -gt 0 ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Changes found since $LAST_TAG"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes since $LAST_TAG — skipping publish"
          fi

      - name: set up JDK 17
        if: steps.changes.outputs.has_changes == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        if: steps.changes.outputs.has_changes == 'true'
        uses: android-actions/setup-android@v2

      - name: Setup Gradle
        if: steps.changes.outputs.has_changes == 'true'
        uses: gradle/gradle-build-action@v2

      - name: Setup Xcode
        if: steps.changes.outputs.has_changes == 'true'
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Publish to Repositories
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          ./gradlew publishAllPublicationsToGithubPackagesRepository publishAllPublicationsToMavenCentralRepository
        env:
          ORG_GRADLE_PROJECT_githubPackagesUsername: ${{ github.actor }}
          ORG_GRADLE_PROJECT_githubPackagesPassword: ${{ secrets.GITHUB_TOKEN }}
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_SECRET_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_PASSWORD }}
