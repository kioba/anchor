name: 'publish package'

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

jobs:
  build:

    name: 'build and publish'
    runs-on: macos-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: checkout project
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate publish secrets
        run: |
          MISSING=""
          [ -z "$MC_USER" ] && MISSING="$MISSING MAVEN_CENTRAL_USERNAME"
          [ -z "$MC_PASS" ] && MISSING="$MISSING MAVEN_CENTRAL_PASSWORD"
          [ -z "$GPG_KEY" ] && MISSING="$MISSING GPG_SECRET_KEY"
          [ -z "$GPG_PW"  ] && MISSING="$MISSING GPG_PASSWORD"
          if [ -n "$MISSING" ]; then
            echo "::error::Missing required secrets:$MISSING"
            exit 1
          fi
          echo "All required secrets are present"
        env:
          MC_USER: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MC_PASS: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          GPG_KEY: ${{ secrets.GPG_SECRET_KEY }}
          GPG_PW: ${{ secrets.GPG_PASSWORD }}

      - name: set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Print toolchain versions
        run: |
          echo "=== Java ==="
          java -version
          echo "=== Gradle ==="
          ./gradlew --version
          echo "=== Xcode ==="
          xcodebuild -version || true
          echo "=== gradle.properties ==="
          grep -v -E '^(#|$)' gradle.properties

      - name: Assemble publishable artifacts
        timeout-minutes: 30
        run: >
          ./gradlew
          :anchor:assemble
          :anchor-compose:assemble
          :anchor-test:assemble
          --stacktrace

      - name: Publish to Maven Central
        timeout-minutes: 30
        run: >
          ./gradlew publishAndReleaseToMavenCentral
          --no-configuration-cache
          --stacktrace
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_SECRET_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_PASSWORD }}

      - name: Bump patch version for next development iteration
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          IFS='.' read -r major minor patch <<< "$VERSION"
          NEXT_VERSION="$major.$minor.$((patch + 1))"
          BRANCH="bump-version-to-$NEXT_VERSION"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          sed -i '' "s/^POM_VERSION=.*/POM_VERSION=$NEXT_VERSION/" gradle.properties
          GROUP_ID=$(grep '^POM_GROUP_ID=' gradle.properties | cut -d'=' -f2)
          sed -i '' -E "s|(${GROUP_ID}:anchor[a-z-]*):[0-9]+\.[0-9]+\.[0-9]+|\1:${VERSION}|g" README.md
          sed -i '' "s|version: \"[0-9]*\.[0-9]*\.[0-9]*\"|version: \"${VERSION}\"|" mkdocs.yml
          sed -i '' "s|Published version: \`[0-9]*\.[0-9]*\.[0-9]*\`|Published version: \`${VERSION}\`|g" CLAUDE.md
          bash scripts/generate-llms-full.sh
          sed -i '' -E "s|(${GROUP_ID}:anchor[a-z-]*):[0-9]+\.[0-9]+\.[0-9]+|\1:${VERSION}|g" AGENTS.md
          sed -i '' "s|Published version: [0-9]*\.[0-9]*\.[0-9]*|Published version: ${VERSION}|" AGENTS.md
          git add gradle.properties README.md mkdocs.yml CLAUDE.md AGENTS.md docs/llms-full.txt
          git commit -m "🔖 Bump version to $NEXT_VERSION"
          git push origin "$BRANCH"
          gh pr create \
            --title "🔖 Bump version to $NEXT_VERSION" \
            --body "Automated version bump after publishing v$VERSION." \
            --base master \
            --head "$BRANCH"
