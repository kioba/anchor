name: 'publish package'

on:
  workflow_dispatch:
  schedule:
    # Every Monday at 10:00 UTC
    - cron: '0 10 * * 1'

jobs:
  build:

    name: 'build and publish'
    runs-on: macos-latest
    permissions:
      contents: write
      packages: write
      pull-requests: write

    steps:
      - name: checkout project
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for changes since last release tag
        id: changes
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "No previous tag found — first release"
          elif [ "$(git rev-list "$LAST_TAG"..HEAD --count)" -gt 0 ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Changes found since $LAST_TAG"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes since $LAST_TAG — skipping publish"
          fi

      - name: Validate publish secrets
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          MISSING=""
          [ -z "$MC_USER" ] && MISSING="$MISSING MAVEN_CENTRAL_USERNAME"
          [ -z "$MC_PASS" ] && MISSING="$MISSING MAVEN_CENTRAL_PASSWORD"
          [ -z "$GPG_KEY" ] && MISSING="$MISSING GPG_SECRET_KEY"
          [ -z "$GPG_PW"  ] && MISSING="$MISSING GPG_PASSWORD"
          if [ -n "$MISSING" ]; then
            echo "::error::Missing required secrets:$MISSING"
            exit 1
          fi
          echo "All required secrets are present"
        env:
          MC_USER: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MC_PASS: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          GPG_KEY: ${{ secrets.GPG_SECRET_KEY }}
          GPG_PW: ${{ secrets.GPG_PASSWORD }}

      - name: set up JDK 21
        if: steps.changes.outputs.has_changes == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        if: steps.changes.outputs.has_changes == 'true'
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        if: steps.changes.outputs.has_changes == 'true'
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Xcode
        if: steps.changes.outputs.has_changes == 'true'
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Print toolchain versions
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          echo "=== Java ==="
          java -version
          echo "=== Gradle ==="
          ./gradlew --version
          echo "=== Xcode ==="
          xcodebuild -version || true
          echo "=== gradle.properties ==="
          grep -v -E '^(#|$)' gradle.properties

      - name: Publish to GitHub Packages
        if: steps.changes.outputs.has_changes == 'true'
        timeout-minutes: 30
        run: >
          ./gradlew publishAllPublicationsToGithubPackagesRepository
          -PwarningsAsErrors=false
          --no-configuration-cache
          --stacktrace
        env:
          ORG_GRADLE_PROJECT_githubPackagesUsername: ${{ github.actor }}
          ORG_GRADLE_PROJECT_githubPackagesPassword: ${{ secrets.GITHUB_TOKEN }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_SECRET_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_PASSWORD }}

      - name: Publish to Maven Central
        if: steps.changes.outputs.has_changes == 'true'
        timeout-minutes: 30
        run: >
          ./gradlew publishAndReleaseToMavenCentral
          -PwarningsAsErrors=false
          --no-configuration-cache
          --stacktrace
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_SECRET_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_PASSWORD }}

      - name: Read version from gradle.properties
        if: steps.changes.outputs.has_changes == 'true'
        id: version
        run: |
          VERSION=$(grep '^POM_VERSION=' gradle.properties | cut -d'=' -f2)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Create git tag and GitHub release
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag $VERSION already exists — skipping tag and release"
          else
            git tag "$VERSION"
            git push origin "$VERSION"
            gh release create "$VERSION" --generate-notes --title "v$VERSION"
          fi

      - name: Bump patch version
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          IFS='.' read -r major minor patch <<< "$VERSION"
          NEXT_VERSION="$major.$minor.$((patch + 1))"
          BRANCH="bump-version-to-$NEXT_VERSION"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          sed -i '' "s/^POM_VERSION=.*/POM_VERSION=$NEXT_VERSION/" gradle.properties
          GROUP_ID=$(grep '^POM_GROUP_ID=' gradle.properties | cut -d'=' -f2)
          sed -i '' "s|${GROUP_ID}:anchor:[0-9]*\.[0-9]*\.[0-9]*|${GROUP_ID}:anchor:${VERSION}|g" README.md
          sed -i '' "s|version: \"[0-9]*\.[0-9]*\.[0-9]*\"|version: \"${VERSION}\"|" mkdocs.yml
          sed -i '' "s|Published version: \`[0-9]*\.[0-9]*\.[0-9]*\`|Published version: \`${VERSION}\`|g" CLAUDE.md
          bash scripts/generate-llms-full.sh
          sed -i '' "s|${GROUP_ID}:anchor:[0-9]*\.[0-9]*\.[0-9]*|${GROUP_ID}:anchor:${VERSION}|g" AGENTS.md
          sed -i '' "s|Published version: [0-9]*\.[0-9]*\.[0-9]*|Published version: ${VERSION}|" AGENTS.md
          git add gradle.properties README.md mkdocs.yml CLAUDE.md AGENTS.md docs/llms-full.txt
          git commit -m "🔖 Bump version to $NEXT_VERSION"
          git push origin "$BRANCH"
          gh pr create \
            --title "🔖 Bump version to $NEXT_VERSION" \
            --body "Automated version bump after publishing v$VERSION." \
            --base master \
            --head "$BRANCH"
